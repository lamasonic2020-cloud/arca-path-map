<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方舟ARCA內部轉化路徑地圖 0 到 1</title>
<style>
  :root {
    --bg: #08080a;
    --card: #131316;
    --card-2: #1b1b20;
    --border: #2b2b33;
    --text: #eeeef2;
    --muted: #9a9aa8;
    --accent: #ff2f00;
    --accent-dim: rgba(255, 47, 0, 0.12);
    --accent-line: rgba(255, 47, 0, 0.5);
    --on-accent: #ffffff;
    --ok: #4fc98a;
    --ok-dim: rgba(79, 201, 138, 0.1);
    --bad: #e56a6a;
    --bad-dim: rgba(229, 106, 106, 0.1);
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(ellipse 90% 40% at 50% -5%, rgba(255, 47, 0, 0.14), transparent 65%), var(--bg);
    color: var(--text);
    font-family: "Noto Sans TC", "PingFang TC", "Heiti TC", "Microsoft JhengHei", system-ui, -apple-system, sans-serif;
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: 0 18px 80px; }

  /* ── 頂部進度條 ────────────────────── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    background: rgba(8, 8, 10, 0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  #topbar .inner {
    max-width: 860px; margin: 0 auto;
    display: flex; align-items: center; gap: 4px;
    padding: 10px 14px;
  }
  .tb-step {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-family: inherit; font-size: 11px; padding: 2px 0;
    transition: color 0.2s;
  }
  .tb-step .bar {
    width: 100%; height: 4px; border-radius: 2px;
    background: var(--border);
    transition: background 0.25s;
  }
  .tb-step.active { color: var(--accent); }
  .tb-step.active .bar { background: var(--accent); }
  .tb-step.passed .bar { background: var(--accent-line); }
  .tb-step .lbl { white-space: nowrap; }
  @media (max-width: 480px) { .tb-step .lbl { font-size: 10px; } }

  /* ── Hero ────────────────────── */
  header.hero { padding: 92px 0 8px; text-align: center; }
  .logo { width: 150px; height: auto; margin-bottom: 16px; }
  header.hero h1 { font-size: 27px; font-weight: 700; letter-spacing: 1px; line-height: 1.4; }
  header.hero h1 .hl { color: var(--accent); }
  header.hero p { color: var(--muted); font-size: 15px; margin-top: 10px; }

  /* ── 自測 ────────────────────── */
  #quiz {
    margin: 24px 0 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 26px 22px;
  }
  #quiz .q-tag {
    display: inline-block; font-size: 12px; color: var(--accent);
    background: var(--accent-dim); border-radius: 20px;
    padding: 3px 12px; margin-bottom: 12px;
  }
  #quiz .q-count { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  #quiz .q-text { font-size: 19px; font-weight: 600; line-height: 1.6; }
  #quiz .q-opts { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
  #quiz .q-opts button {
    flex: 1; min-width: 130px;
    background: var(--card-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 13px 16px; font-size: 15px; font-family: inherit;
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
  }
  #quiz .q-opts button:hover { border-color: var(--accent); background: var(--accent-dim); }
  #quiz .q-skip {
    display: block; margin: 18px auto 0;
    background: none; border: none; color: var(--muted);
    font-size: 13px; font-family: inherit; cursor: pointer;
    text-decoration: underline; text-underline-offset: 3px;
  }
  #quiz .q-dots { display: flex; gap: 6px; margin-bottom: 16px; }
  #quiz .q-dots span {
    width: 26px; height: 5px; border-radius: 3px; background: var(--border);
  }
  #quiz .q-dots span.done { background: var(--accent); }

  #quiz .result { text-align: center; }
  #quiz .result .r-icon { font-size: 34px; margin-bottom: 8px; }
  #quiz .result h2 { font-size: 21px; margin-bottom: 8px; }
  #quiz .result h2 .hl { color: var(--accent); }
  #quiz .result p { color: var(--muted); font-size: 15px; margin-bottom: 18px; }
  #quiz .result .r-go {
    background: var(--accent); color: var(--on-accent);
    border: none; border-radius: 10px;
    padding: 13px 30px; font-size: 16px; font-weight: 700;
    font-family: inherit; cursor: pointer;
  }
  #quiz .result .r-again {
    display: block; margin: 14px auto 0;
    background: none; border: none; color: var(--muted);
    font-size: 13px; font-family: inherit; cursor: pointer;
    text-decoration: underline; text-underline-offset: 3px;
  }

  /* ── 路徑總覽 ────────────────────── */
  #overview { margin-top: 36px; }
  #overview h2 { font-size: 17px; color: var(--muted); font-weight: 500; margin-bottom: 16px; text-align: center; }
  .map { display: flex; flex-direction: column; }
  .map-card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    text-align: left; font-family: inherit; color: var(--text);
  }
  .map-card:hover { border-color: var(--accent-line); }
  .map-card.stuck { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 6px 24px rgba(255,47,0,0.2); }
  .map-card .m-top { display: flex; align-items: center; gap: 10px; }
  .map-card .m-num {
    width: 28px; height: 28px; flex-shrink: 0;
    border-radius: 50%; background: var(--accent-dim); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
  }
  .map-card.done-q .m-num { background: var(--ok-dim); color: var(--ok); }
  .map-card .m-name { font-size: 17px; font-weight: 700; }
  .map-card .m-badge {
    margin-left: auto; font-size: 11px; font-weight: 700;
    color: var(--on-accent); background: var(--accent);
    border-radius: 20px; padding: 2px 10px; white-space: nowrap;
  }
  .map-card .m-badge.ok { background: var(--ok-dim); color: var(--ok); }
  .map-card .m-tag { font-size: 14px; color: var(--muted); margin-top: 6px; }
  .map-card .m-q {
    font-size: 13px; color: var(--text);
    background: var(--card-2); border-radius: 8px;
    padding: 8px 12px; margin-top: 10px;
  }
  .map-card .m-q::before { content: "自我檢測 "; color: var(--accent); font-weight: 600; }
  .map-link {
    height: 26px; display: flex; justify-content: center; align-items: center;
    color: var(--accent-line); font-size: 15px;
  }
  /* 桌機:橫向地圖 */
  @media (min-width: 900px) {
    .map { flex-direction: row; align-items: stretch; }
    .map-card { flex: 1; padding: 16px 14px; }
    .map-card .m-top { flex-direction: column; align-items: flex-start; gap: 8px; }
    .map-card .m-badge { margin-left: 0; }
    .map-card .m-name { font-size: 16px; }
    .map-card .m-q { font-size: 12px; }
    .map-link { width: 26px; height: auto; }
  }

  /* ── 站點 ────────────────────── */
  #stations { margin-top: 44px; display: flex; flex-direction: column; gap: 0; }
  .station { position: relative; padding-left: 34px; scroll-margin-top: 70px; }
  .station::before {
    content: ""; position: absolute; left: 13px; top: 44px; bottom: -8px;
    width: 2px; background: var(--border);
  }
  .station:last-child::before { display: none; }
  .st-dot {
    position: absolute; left: 0; top: 14px;
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--card-2); border: 2px solid var(--border);
    color: var(--muted); font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .station.open .st-dot { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
  .st-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 18px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .station.open .st-card { border-color: var(--accent-line); }
  .st-head {
    width: 100%; display: flex; align-items: center; gap: 12px;
    background: none; border: none; color: var(--text);
    font-family: inherit; text-align: left;
    padding: 18px 20px; cursor: pointer;
  }
  .st-head .h-name { font-size: 18px; font-weight: 700; }
  .st-head .h-tag { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .st-head .h-arrow {
    margin-left: auto; color: var(--muted); font-size: 14px;
    transition: transform 0.25s; flex-shrink: 0;
  }
  .station.open .h-arrow { transform: rotate(180deg); color: var(--accent); }
  .st-body { display: none; padding: 0 20px 22px; }
  .station.open .st-body { display: block; }

  .sec-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 700; color: var(--accent);
    margin: 26px 0 10px;
  }
  .sec-label::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .goal-box {
    background: var(--card-2); border-radius: 10px;
    padding: 14px 16px; font-size: 15px;
  }
  ol.steps { list-style: none; counter-reset: s; display: flex; flex-direction: column; gap: 10px; }
  ol.steps li {
    counter-increment: s; position: relative;
    padding-left: 34px; font-size: 15px;
  }
  ol.steps li::before {
    content: counter(s);
    position: absolute; left: 0; top: 3px;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent-dim); color: var(--accent);
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  ol.steps li b { color: var(--accent); font-weight: 700; }

  /* 公式 + 範例 */
  .formula-block { margin-bottom: 16px; }
  .f-card {
    background: linear-gradient(135deg, rgba(255,47,0,0.14), rgba(255,47,0,0.04));
    border: 1px solid var(--accent-line);
    border-radius: 12px; padding: 14px 16px;
  }
  .f-card .f-label {
    font-size: 12px; font-weight: 700; color: var(--accent);
    letter-spacing: 1px; margin-bottom: 6px;
  }
  .f-card .f-text { font-size: 15px; font-weight: 600; line-height: 1.7; }
  .e-card {
    background: var(--card-2); border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 12px 12px;
    margin: 0 10px;
  }
  .e-head {
    width: 100%; display: flex; align-items: center; gap: 8px;
    background: none; border: none; color: var(--muted);
    font-family: inherit; font-size: 12px; font-weight: 600;
    padding: 10px 14px; cursor: pointer;
  }
  .e-head .e-arrow { margin-left: auto; transition: transform 0.2s; }
  .e-card.open .e-arrow { transform: rotate(180deg); }
  .e-body { display: none; padding: 0 14px 14px; font-size: 14px; white-space: pre-line; color: var(--text); }
  .e-card.open .e-body { display: block; }
  .e-body .quote {
    background: rgba(255,255,255,0.03);
    border-left: 3px solid var(--accent-line);
    border-radius: 0 8px 8px 0;
    padding: 10px 14px;
  }

  /* ❌ ✅ 對照 */
  .compare { display: flex; flex-direction: column; gap: 12px; }
  @media (min-width: 720px) { .compare { flex-direction: row; } .compare > div { flex: 1; } }
  .cmp-card { border-radius: 12px; padding: 16px; }
  .cmp-card .c-label { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
  .cmp-card .c-text { font-size: 14px; white-space: pre-line; }
  .cmp-bad { background: var(--bad-dim); border: 1px solid rgba(229,106,106,0.4); }
  .cmp-bad .c-label { color: var(--bad); }
  .cmp-good { background: var(--ok-dim); border: 1px solid rgba(79,201,138,0.4); }
  .cmp-good .c-label { color: var(--ok); }
  .cmp-diff { margin-top: 12px; background: var(--card-2); border-radius: 10px; padding: 12px 16px; }
  .cmp-diff .d-title { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
  .cmp-diff ul { list-style: none; }
  .cmp-diff li { font-size: 14px; padding-left: 16px; position: relative; }
  .cmp-diff li::before { content: "·"; position: absolute; left: 4px; color: var(--accent); font-weight: 700; }

  /* niche 分頁 */
  .niche-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .niche-tabs button {
    background: var(--card-2); border: 1px solid var(--border);
    color: var(--muted); border-radius: 20px;
    padding: 7px 16px; font-size: 14px; font-family: inherit;
    cursor: pointer; transition: all 0.15s;
  }
  .niche-tabs button.active {
    background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 700;
  }
  .niche-panel { display: none; flex-direction: column; gap: 10px; }
  .niche-panel.active { display: flex; }
  .n-step {
    background: var(--card-2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
  }
  .n-step .n-label { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .n-step .n-text { font-size: 14px; white-space: pre-line; }

  /* 常見錯誤 */
  ul.mistakes { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  ul.mistakes li {
    background: var(--bad-dim); border-radius: 10px;
    padding: 10px 14px 10px 38px; font-size: 14px; position: relative;
  }
  ul.mistakes li::before { content: "✕"; position: absolute; left: 14px; color: var(--bad); font-weight: 700; }

  /* 過關基準 */
  .benchmark {
    margin-top: 26px;
    border: 1px dashed var(--accent-line);
    background: var(--accent-dim);
    border-radius: 12px; padding: 14px 16px;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .benchmark .b-icon { font-size: 18px; }
  .benchmark .b-label { font-size: 12px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .benchmark .b-text { font-size: 15px; font-weight: 600; }

  .note-box {
    margin-top: 10px; background: var(--card-2);
    border-radius: 10px; padding: 10px 14px;
    font-size: 14px; color: var(--text);
  }
  .note-box b { color: var(--accent); }

  .next-btn {
    display: block; width: 100%;
    margin-top: 22px;
    background: var(--accent); color: var(--on-accent);
    border: none; border-radius: 10px;
    padding: 14px; font-size: 15px; font-weight: 700;
    font-family: inherit; cursor: pointer;
    transition: filter 0.15s;
  }
  .next-btn:hover { filter: brightness(1.08); }
  .next-btn.ghost {
    background: var(--card-2); color: var(--accent);
    border: 1px solid var(--accent-line);
  }

  footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 50px; }
</style>
</head>

/* ════════════════════════════════════════════
   渲染
   ════════════════════════════════════════════ */
const $ = (s, el = document) => el.querySelector(s);
const quizAnswers = new Array(STATIONS.length).fill(null);
let quizDone = false;

/* ── 頂部進度條 ── */
function renderTopbar() {
  $("#topbarInner").innerHTML = STATIONS.map((s, i) => `
    <button class="tb-step" data-i="${i}" onclick="openStation(${i}, true)">
      <span class="bar"></span>
      <span class="lbl">${i + 1} ${s.shortName}</span>
    </button>
  `).join("");
}
function setTopbar(activeIdx) {
  document.querySelectorAll(".tb-step").forEach((el, i) => {
    el.classList.toggle("active", i === activeIdx);
    el.classList.toggle("passed", i < activeIdx);
  });
}

/* ── 自測 ── */
function renderQuiz(step = 0) {
  const box = $("#quiz");
  if (step >= STATIONS.length) return renderQuizResult();
  const s = STATIONS[step];
  box.innerHTML = `
    <div class="q-dots">${STATIONS.map((_, i) => `<span class="${i < step ? "done" : ""}"></span>`).join("")}</div>
    <span class="q-tag">站${["一","二","三","四","五"][step]} ${s.name}</span>
    <div class="q-count">自我檢測 第 ${step + 1} 題 共 ${STATIONS.length} 題</div>
    <div class="q-text">${s.quiz.question}?</div>
    <div class="q-opts">
      ${s.quiz.options.map((o, oi) => `<button onclick="answerQuiz(${step}, ${oi})">${o.label}</button>`).join("")}
    </div>
    ${step === 0 ? `<button class="q-skip" onclick="skipQuiz()">跳過檢測 直接看地圖</button>` : ""}
  `;
}
function answerQuiz(step, optIdx) {
  quizAnswers[step] = STATIONS[step].quiz.options[optIdx].pass;
  renderQuiz(step + 1);
}
function skipQuiz() {
  $("#quiz").innerHTML = `
    <div class="result">
      <div class="r-icon">🗺️</div>
      <h2>先逛地圖也可以</h2>
      <p>想找出自己卡在哪一站 隨時回來做檢測</p>
      <button class="r-go" onclick="restartQuiz()">開始檢測</button>
    </div>`;
  renderMap();
}
function restartQuiz() {
  quizAnswers.fill(null);
  quizDone = false;
  renderQuiz(0);
  renderMap();
  $("#quiz").scrollIntoView({ block: "center" });
}
function renderQuizResult() {
  quizDone = true;
  const stuckIdx = quizAnswers.findIndex(a => a === false);
  const box = $("#quiz");
  if (stuckIdx === -1) {
    box.innerHTML = `
      <div class="result">
        <div class="r-icon">🎉</div>
        <h2>五站你都有基礎了</h2>
        <p>接下來看每站的過關基準 找出還沒達標的數字</p>
        <button class="r-go" onclick="openStation(0, true)">從站一開始複習</button>
        <button class="r-again" onclick="restartQuiz()">重新檢測</button>
      </div>`;
  } else {
    const s = STATIONS[stuckIdx];
    box.innerHTML = `
      <div class="result">
        <div class="r-icon">📍</div>
        <h2>你卡在 <span class="hl">站${["一","二","三","四","五"][stuckIdx]} ${s.name}</span></h2>
        <p>${s.tagline}<br>先把這站打通 再往下走</p>
        <button class="r-go" onclick="openStation(${stuckIdx}, true)">從這裡開始</button>
        <button class="r-again" onclick="restartQuiz()">重新檢測</button>
      </div>`;
  }
  renderMap();
}

/* ── 路徑總覽 ── */
function renderMap() {
  const stuckIdx = quizDone ? quizAnswers.findIndex(a => a === false) : -1;
  $("#mapCards").innerHTML = STATIONS.map((s, i) => {
    const passed = quizDone && quizAnswers[i] === true;
    const stuck = quizDone && i === stuckIdx;
    let badge = "";
    if (stuck) badge = `<span class="m-badge">從這裡開始</span>`;
    else if (passed) badge = `<span class="m-badge ok">✓ 已過關</span>`;
    return `
      <button class="map-card ${stuck ? "stuck" : ""} ${passed ? "done-q" : ""}" onclick="openStation(${i}, true)">
        <div class="m-top">
          <span class="m-num">${passed ? "✓" : i + 1}</span>
          <span class="m-name">${s.name}</span>
          ${badge}
        </div>
        <div class="m-tag">${s.tagline}</div>
        <div class="m-q">${s.quiz.question}?</div>
      </button>
      ${i < STATIONS.length - 1 ? `<div class="map-link">➤</div>` : ""}
    `;
  }).join("");
}

/* ── 公式 + 範例 元件 ── */
function formulaBlock(f, sid, fi) {
  let html = `
    <div class="formula-block">
      <div class="f-card">
        <div class="f-label">${f.label}</div>
        <div class="f-text">${f.formula}</div>
      </div>`;
  if (f.example) {
    html += `
      <div class="e-card open" id="ex-${sid}-${fi}">
        <button class="e-head" onclick="toggleExample('ex-${sid}-${fi}')">
          <span>💬 ${f.example.title}</span>
          <span class="e-arrow">▾</span>
        </button>
        <div class="e-body"><div class="quote">${f.example.text}</div></div>
      </div>`;
  }
  if (f.note) html += `<div class="note-box">${f.note}</div>`;
  html += `</div>`;
  return html;
}
function toggleExample(id) {
  document.getElementById(id).classList.toggle("open");
}

/* ── 站點 ── */
function renderStations() {
  $("#stations").innerHTML = STATIONS.map((s, i) => {
    let body = "";

    body += `<div class="sec-label">🎯 這站的目標</div>
             <div class="goal-box">${s.goal}</div>`;

    body += `<div class="sec-label">🛠 ${s.stepsTitle}</div>
             <ol class="steps">${s.steps.map(st => `<li>${st}</li>`).join("")}</ol>`;

    if (s.compare) {
      body += `<div class="sec-label">⚖️ 對照範例</div>
        <div class="compare">
          <div class="cmp-card cmp-bad">
            <div class="c-label">${s.compare.bad.label}</div>
            <div class="c-text">${s.compare.bad.text}</div>
          </div>
          <div class="cmp-card cmp-good">
            <div class="c-label">${s.compare.good.label}</div>
            <div class="c-text">${s.compare.good.text}</div>
          </div>
        </div>
        <div class="cmp-diff">
          <div class="d-title">差別在哪</div>
          <ul>${s.compare.diffs.map(d => `<li>${d}</li>`).join("")}</ul>
        </div>`;
    }

    body += `<div class="sec-label">📐 公式 + 範例</div>
             ${s.formulas.map((f, fi) => formulaBlock(f, s.id, fi)).join("")}`;

    if (s.niches) {
      body += `<div class="sec-label">💬 完整四步範例（選你的行業）</div>
        <div class="niche-tabs" id="ntabs-${s.id}">
          ${s.niches.map((n, ni) => `<button class="${ni === 0 ? "active" : ""}" onclick="switchNiche('${s.id}', ${ni})">${n.label}</button>`).join("")}
        </div>
        ${s.niches.map((n, ni) => `
          <div class="niche-panel ${ni === 0 ? "active" : ""}" id="npanel-${s.id}-${ni}">
            ${n.steps.map((txt, si) => `
              <div class="n-step">
                <div class="n-label">${s.nicheStepLabels[si]}</div>
                <div class="n-text">${txt}</div>
              </div>`).join("")}
          </div>`).join("")}`;
    }

    body += `<div class="sec-label">⚠️ 常見錯誤</div>
             <ul class="mistakes">${s.mistakes.map(m => `<li>${m}</li>`).join("")}</ul>`;

    body += `<div class="benchmark">
               <span class="b-icon">🏁</span>
               <div>
                 <div class="b-label">過關基準 · 達標才往下一站</div>
                 <div class="b-text">${s.benchmark}</div>
               </div>
             </div>`;

    if (i < STATIONS.length - 1) {
      body += `<button class="next-btn" onclick="openStation(${i + 1}, true)">下一站 ${STATIONS[i + 1].name} →</button>`;
    } else {
      body += `<button class="next-btn ghost" onclick="backToMap()">↺ 回到路徑總覽</button>`;
    }

    return `
      <div class="station" id="station-${i}">
        <div class="st-dot">${i + 1}</div>
        <div class="st-card">
          <button class="st-head" onclick="toggleStation(${i})">
            <div>
              <div class="h-name">站${["一","二","三","四","五"][i]} ${s.name}</div>
              <div class="h-tag">${s.tagline}</div>
            </div>
            <span class="h-arrow">▾</span>
          </button>
          <div class="st-body">${body}</div>
        </div>
      </div>`;
  }).join("");
}

function switchNiche(sid, ni) {
  const tabs = document.getElementById("ntabs-" + sid);
  [...tabs.children].forEach((b, i) => b.classList.toggle("active", i === ni));
  document.querySelectorAll(`[id^="npanel-${sid}-"]`).forEach((p, i) =>
    p.classList.toggle("active", i === ni)
  );
}

let openIdx = -1;
function closeAll() {
  document.querySelectorAll(".station").forEach(el => el.classList.remove("open"));
}
function toggleStation(i) {
  const el = document.getElementById("station-" + i);
  const wasOpen = el.classList.contains("open");
  closeAll();
  if (!wasOpen) {
    el.classList.add("open");
    openIdx = i;
    setTopbar(i);
  } else {
    openIdx = -1;
  }
}
function openStation(i, scroll) {
  closeAll();
  const el = document.getElementById("station-" + i);
  el.classList.add("open");
  openIdx = i;
  setTopbar(i);
  if (scroll) setTimeout(() => {
    el.scrollIntoView({ block: "start" });
  }, 80);
}
function backToMap() {
  closeAll();
  openIdx = -1;
  $("#overview").scrollIntoView();
}

/* ── 捲動時同步進度條 ── */
const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting && openIdx === -1) {
      const i = parseInt(e.target.id.replace("station-", ""), 10);
      setTopbar(i);
    }
  });
}, { rootMargin: "-30% 0px -60% 0px" });

/* ── 啟動 ── */
renderTopbar();
renderQuiz(0);
renderMap();
renderStations();
setTopbar(0);
document.querySelectorAll(".station").forEach(el => io.observe(el));
</script>
</body>
